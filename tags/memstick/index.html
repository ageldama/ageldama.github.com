<script>

 let dark_count = 0;
 let dark_hit = 5;

 function addDarkmodeWidget() {
     var options = {
         
         
         
         time: '0.5s', 
         mixColor: '#fff', 
         
         
         backgroundColor: '#fffbeb',  
         buttonColorDark: '#566666',  
         buttonColorLight: '#566666', 
         saveInCookies: true, 
          
         autoMatchOsTheme: true 
     }

     var darkmode = new Darkmode(options);
     window.darkmode = darkmode;

     $('.dark-mode-btn').click(function(){
         dark_count ++;
         if (dark_count === dark_hit) {
             splashText('show me the money!💲');
             moneymoneymoney();
         } else {
             if (dark_count % 2 === 0) {
                 splashCount(dark_count, dark_hit);
             }
             darkmode.toggle();
         }
     });

     $('.snow-mode-btn').click(function(){
         if (!darkmode.isActivated()) {
             darkmode.toggle(); 
         }
         letitsnow();
         $('.snow-mode-btn').prop('disabled', true);
     });
 }


 window.addEventListener('load', addDarkmodeWidget);


 function letitrain() {
     $('body').addClass('acid-decay');
 }


 function splashCount(left, tot) {
     let splash = new Splash({background: 'rgba(0, 0, 0, 0.7)'}, {
         use: true,
         start: FancyAnimation.moveIn,
         end: FancyAnimation.rubberBand
     });
     splash.fromText(`${left}/${tot}`,  10, {
         color: '#00ff00',
         'font-family': 'monospace',
         'font-size': '20rem',
     });
 }

 function splashText(txt) {
     let splash = new Splash({background: 'rgba(0, 0, 0, 0.7)'}, {
         use: true,
         start: FancyAnimation.moveIn,
         end: FancyAnimation.rubberBand
     });
     splash.fromText(txt,  18*60*1000, {
         color: '#ffd700',
         'font-family': 'fantasy',
         'font-size': '2rem',
     });
 }

</script>
